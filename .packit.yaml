# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: rpm/velora-desktop-schemas.spec

# add or remove files that should be synced
synced_files:
    - rpm/velora-desktop-schemas.spec
    - .packit.yaml

upstream_package_name: velora-desktop-schemas
# downstream (Fedora) RPM package name
downstream_package_name: velora-desktop-schemas

actions:
  fix-spec-file: |
    bash -c "sed -i -r \"0,/Version:/ s/Version:(\s*)\S*/Version:\1${PACKIT_PROJECT_VERSION}/\" rpm/velora-desktop-schemas.spec"
